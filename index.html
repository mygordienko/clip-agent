<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clip Agent</title>
    <link rel="stylesheet" type="text/css" href="./styles.css">
</head>
<body>
    <div class="page-container">
        <!-- Main Content -->
        <main class="content-area">
            <p id="clip-text-content" class="content-text">
            </p>
        </main>

        <!-- Footer Buttons -->
        <footer class="action-bar">
            <span id="info-text" class="action-bar-text"></span>
            <button id="pull-remote-btn" class="action-btn icon-btn" aria-label="Pull remote" title="Read from remote">
                ↢
            </button>
            <button id="refresh-btn" class="action-btn icon-btn" aria-label="Refresh" title="Read from clipboard">
                ↻
            </button>
            <button id="clip-btn" class="action-btn icon-btn" aria-label="Clip" title="Clip">
                ⤓
            </button>
            <button id="clear-btn" class="action-btn icon-btn cancel" aria-label="Clear" title="Clear clipboard">
                ✕
            </button>
        </footer>
    </div>
</body>
<script src="renderer.js"></script>
</html>
